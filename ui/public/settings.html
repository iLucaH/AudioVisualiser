<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
		<script type="module" src="js/settings.js"></script>
		<link rel='stylesheet' type='text/css' href='settings.css'>
        <title>AV Settings</title>
    </head>
    <body>
		<h1>AudioVisualiser Settings:</h1>
		<h2>Render Settings</h2>
		<div id="renderClass">
			<form id="whForm">
				<label for="width">Width:</label>
				<input type="number" min=100 max=1920 name="width" id="width" placeholder="Width">
				<label for="height">Height:</label>
				<input type="number" min=100 max=1080 name="height" id="height" placeholder="Height">
				<button id="nativeFunctionWidthHeightButton" type="button">Update</button>
			</form>
		</div>
		<h2>Audio Settings</h2>
		<div id="audioClass">
			<label for="fft">FFT size:</label>
			<select id="fft" name="fft">
				<option value="1024">1024</option>
				<option value="2048">2048</option>
				<option value="4096">4096</option>
				<option value="8192">8192</option>
				<option value="16384">16384</option>
				<option value="32768">32768</option>
			</select>
		</div>
    </body>
</html>
