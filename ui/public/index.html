<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
		<script type="module" src="js/index.js"></script>
		<link rel='stylesheet' type='text/css' href='style.css'>
        <title>Login to AudioVisualiser Service</title>
    </head>
    <body>
		<div class="login" id="loginClass">
			<h1 id="titleMessage">Account login:</h1>
			<div id="loginMessageHolder">
				<p id="loginMessage">Invalid login credentials!</p>
			</div>
			<form id="loginForm">
				<input type="text" name="username" id="usernameField" placeholder="Username">
				<input type="password" name="password" id="passwordField" placeholder="Password">
				<button id="nativeFunctionLoginButton" type="button">Login</button>
			</form>
			<div class="register">
				<button id="registerButton" type="button">Register</button>
			</div>
		</div>
    </body>
</html>
